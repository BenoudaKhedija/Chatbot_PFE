<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #chat-container {
    width: 100%;
    height: 100vh;
    max-width: 480px;
    background: white;
    border-radius: 12px;
    border: 1px solid #dce3f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  /* ── HEADER ── */
  #chat-header {
    background: linear-gradient(135deg, #00843D, #005C29);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #chat-header .title { font-size: 15px; font-weight: 600; }
  #chat-header .subtitle { font-size: 11px; opacity: 0.75; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4cff91;
    margin-left: auto;
    box-shadow: 0 0 6px #4cff91;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8faff;
  }

  .message {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
  }

  .user-msg {
    align-self: flex-end;
    background: #00843D;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bot-msg {
    align-self: flex-start;
    background: white;
    color: #1a1a2e;
    border: 1px solid #d0ead8;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,80,0.06);
  }

  /* ── TABLEAU DE RÉSULTATS ── */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 8px;
    border-radius: 6px;
    overflow: hidden;
  }
  .result-table th {
    background: #00843D;
    color: white;
    padding: 6px 10px;
    text-align: left;
    font-weight: 600;
    white-space: nowrap;
  }
  .result-table td {
    padding: 5px 10px;
    border-bottom: 1px solid #eef1ff;
  }
  .result-table tr:nth-child(even) td { background: #f5f7ff; }
  .result-table tr:last-child td { border-bottom: none; }
  .more-rows {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    font-style: italic;
  }

  /* ── BLOC SQL ── */
  .sql-block {
    background: #0d1117;
    color: #79c0ff;
    padding: 10px 12px;
    border-radius: 6px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 11.5px;
    margin-top: 10px;
    overflow-x: auto;
    white-space: pre-wrap;
    border-left: 3px solid #00843D;
  }
  .sql-label {
    font-size: 10px;
    color: #58a6ff;
    margin-bottom: 4px;
    display: block;
    font-weight: bold;
    letter-spacing: 0.5px;
  }



/* ── QUESTIONS SUGGÉRÉES ── */
  .question-suggestion {
    padding: 8px 10px;
    margin: 4px 0;
    border-radius: 8px;
    border: 1px solid #d0ead8;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.4;
    transition: all 0.2s;
    background: #f8fff8;
  }
  .question-suggestion:hover {
    background: #00843D;
    color: white;
    border-color: #00843D;
  }
  .question-suggestion:hover span { color: white !important; }




  /* ── RÉSULTAT SIMPLE ── */
  .result-simple {
    font-size: 22px;
    font-weight: 700;
    color: #00843D;
    margin: 4px 0;
  }
  .result-label { font-size: 12px; color: #666; }

  /* ── LOADING ── */
  .loading-dots { display: flex; gap: 4px; padding: 4px 0; }
  .loading-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00843D;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1);opacity:1} }

  /* ── SUGGESTIONS ── */
  .suggestions {
    padding: 8px 16px 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
    background: #f8faff;
    border-top: 1px solid #e8eeff;
  }
  .suggestion-btn {
    background: white;
    border: 1px solid #c0d0ff;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11.5px;
    color: #00843D;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .suggestion-btn:hover { background: #00843D; color: white; border-color: #00843D; }

  /* ── INPUT ── */
  #input-area {
    display: flex;
    padding: 10px 12px;
    border-top: 1px solid #d0ead8;
    gap: 8px;
    background: white;
    flex-shrink: 0;
  }
  #prompt-input {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid #d0dcf0;
    border-radius: 20px;
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s;
    background: #f8faff;
  }
  #prompt-input:focus { border-color: #00843D; background: white; }
  #send-btn {
    background: #00843D;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 9px 18px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #005C29; }
  #send-btn:disabled { background: #aab8d8; cursor: not-allowed; }

  /* ── ERREUR ── */
  .error-msg { color: #c0392b; }


/* ── BANNIÈRE ALERTES ── */
  #alerte-banner {
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 10px 14px;
    flex-shrink: 0;
    border-bottom: 1px solid #e0e0e0;
    font-size: 12.5px;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
 
  #alerte-banner.critique { background: #fff0f0; border-left: 4px solid #c0392b; }
  #alerte-banner.warning  { background: #fff8ee; border-left: 4px solid #e67e22; }
  #alerte-banner.ok       { background: #f0fff5; border-left: 4px solid #00843D; }
 
#alerte-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 13px;
    flex-shrink: 0;
  }
  #alerte-header span { cursor: pointer; font-size: 11px; color: #888; font-weight: 400; }
  #alerte-scroll {
    overflow-y: auto;
    max-height: 110px;
    margin-top: 4px;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: #c0c0c0 transparent;
  }
  #alerte-scroll::-webkit-scrollbar { width: 4px; }
  #alerte-scroll::-webkit-scrollbar-track { background: transparent; }
  #alerte-scroll::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
  #alerte-scroll::-webkit-scrollbar-thumb:hover { background: #999; }
 
  .alerte-ligne {
    display: flex;
    gap: 6px;
    padding: 4px 0;
    border-top: 1px solid rgba(0,0,0,0.05);
    line-height: 1.4;
  }
  .alerte-ligne:first-child { border-top: none; }
  .alerte-ligne .detail { color: #555; font-size: 11.5px; }
 
  #alerte-footer {
    font-size: 10.5px;
    color: #999;
    margin-top: 4px;
    flex-shrink: 0;
    border-top: 1px solid rgba(0,0,0,0.05);
    padding-top: 4px;
  }


</style>
</head>
<body>
<div id="chat-container">

  <!-- HEADER -->
  <div id="chat-header">
    <div>
      <div class="title">Assistant Analytique</div>
      <div class="subtitle">Amen Bank — Monétique</div>
    </div>
    <div class="status-dot" title="Connecté"></div>
  </div>


<!-- BANNIÈRE ALERTES AUTOMATIQUE -->
  <div id="alerte-banner">
    <div id="alerte-header">
      <span id="alerte-titre">Chargement des alertes...</span>
      <span onclick="toggleAlertes()">▲ Réduire</span>
    </div>
    <div id="alerte-scroll">
      <div id="alerte-liste"></div>
    </div>
    <div id="alerte-footer"></div>
  </div>


  <!-- MESSAGES -->
  <div id="messages">
    <div class="message bot-msg">
      Bonjour ! Qu'est ce que vous voulez savoir ?<br>
    </div>
  </div>

  <!-- SUGGESTIONS RAPIDES -->
  <div class="suggestions">
    <button class="suggestion-btn" onclick="afficherSuggestions('transaction')">Transaction</button>
    <button class="suggestion-btn" onclick="afficherSuggestions('atm')">ATM</button>
    <button class="suggestion-btn" onclick="afficherSuggestions('compte')">Compte</button>
    <button class="suggestion-btn" onclick="afficherSuggestions('agence')">Agence</button>
    <button class="suggestion-btn" 
        onclick="nouvelleConversation()" 
        style="border-color:#c0392b;color:#c0392b;">
         Nouvelle conversation
    </button>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <input id="prompt-input" type="text" placeholder="Posez votre question...">
    <button id="send-btn" onclick="sendMessage()">Envoyer</button>
  </div>

</div>

<script>
  // ============================================================
  //  REMPLACEZ PAR VOTRE VRAIE URL NGROK + /api/chat
  //  Exemple : 'https://rewire-parsley-filled.ngrok-free.app/api/chat'   
  // ============================================================
  const BACKEND_URL = 'http://localhost:3000/api/chat';
  let historiqueConversation = [];

  // Échapper le HTML pour éviter les injections XSS
  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Ajouter un message dans la conversation
  function addMessage(html, isUser = false) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + (isUser ? 'user-msg' : 'bot-msg');
    div.innerHTML = html;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  // Formater les données en tableau HTML ou résultat simple
  function formatData(data, nombreLignes) {
  if (!data || data.length === 0) {
    return '<em>Aucun résultat trouvé.</em>';
  }

  const keys = Object.keys(data[0]);

  // Résultat simple : 1 ligne, 1 colonne → grand nombre
  if (data.length === 1 && keys.length === 1) {
    const val   = data[0][keys[0]];
    const label = keys[0].replace(/_/g, ' ');
    return `
      <div class="result-label">${escapeHtml(label)}</div>
      <div class="result-simple">${escapeHtml(String(val))}</div>`;
  }

  // Stocker les données dans une variable globale pour "Voir plus"
  const id = 'resultset_' + Date.now();
  window._resultsets = window._resultsets || {};
  window._resultsets[id] = { data, keys, affichees: 0 };

  const html = `
    <div id="liste_${id}"></div>
    <div id="footer_${id}"></div>
  `;

  // Afficher les premières lignes après insertion dans le DOM
  setTimeout(() => afficherLignes(id, 10), 0);

  return html;
}

// Affiche les N prochaines lignes
function afficherLignes(id, nbAAjouter) {
  const rs     = window._resultsets[id];
  const liste  = document.getElementById('liste_' + id);
  const footer = document.getElementById('footer_' + id);
  if (!rs || !liste) return;

  const debut = rs.affichees;
  const fin   = Math.min(debut + nbAAjouter, rs.data.length);

  // Ajouter les nouvelles lignes
  for (let index = debut; index < fin; index++) {
    const row = rs.data[index];
    const valeurs = rs.keys.map(k => {
      const val   = row[k] !== null && row[k] !== undefined ? row[k] : '—';
      const label = k.replace(/_/g, ' ');
      return `<span style="color:#555;font-size:12px;">${escapeHtml(label)} :</span>
              <strong>${escapeHtml(String(val))}</strong>`;
    }).join('&nbsp;&nbsp;·&nbsp;&nbsp;');

    const div = document.createElement('div');
    div.style.cssText = `
      display:flex; align-items:center; gap:6px;
      padding:7px 10px; margin:3px 0; border-radius:8px;
      background:${index % 2 === 0 ? '#f8fff8' : 'white'};
      border:1px solid #e0ead8; font-size:13px; flex-wrap:wrap;
    `;
    div.innerHTML = `
      <span style="
        background:#00843D; color:white; border-radius:50%;
        width:20px; height:20px; display:inline-flex;
        align-items:center; justify-content:center;
        font-size:11px; font-weight:700; flex-shrink:0;
      ">${index + 1}</span>
      ${valeurs}
    `;
    liste.appendChild(div);
  }

  rs.affichees = fin;

  // Mettre à jour le footer
  const restantes = rs.data.length - fin;
  if (restantes > 0) {
    footer.innerHTML = `
      <div style="margin-top:6px;">
        <span style="font-size:11px;color:#666;font-style:italic;">
          ${fin} / ${rs.data.length} résultats affichés
        </span>
        <button onclick="afficherLignes('${id}', 10)" style="
          margin-left:10px;
          background:white; border:1px solid #00843D;
          color:#00843D; border-radius:12px;
          padding:3px 12px; font-size:11.5px;
          cursor:pointer; transition:all 0.2s;
        "
        onmouseover="this.style.background='#00843D';this.style.color='white'"
        onmouseout="this.style.background='white';this.style.color='#00843D'">
          Voir 10 de plus ▼
        </button>
        <button onclick="afficherLignes('${id}', ${restantes})" style="
          margin-left:6px;
          background:white; border:1px solid #888;
          color:#888; border-radius:12px;
          padding:3px 12px; font-size:11.5px;
          cursor:pointer; transition:all 0.2s;
        "
        onmouseover="this.style.background='#888';this.style.color='white'"
        onmouseout="this.style.background='white';this.style.color='#888'">
          Tout afficher (${restantes} restants)
        </button>
      </div>`;
  } else {
    footer.innerHTML = `
      <div class="more-rows">${rs.data.length} résultat(s) au total.</div>`;
  }
}



  // Envoi du message principal
async function sendMessage() {
  const input  = document.getElementById('prompt-input');
  const btn    = document.getElementById('send-btn');
  const prompt = input.value.trim();
  if (!prompt) return;

  // Afficher le message utilisateur
  addMessage(escapeHtml(prompt), true);
  input.value = '';
  btn.disabled = true;

  // Ajouter la question à l'historique
  historiqueConversation.push({ role: 'user', content: prompt });
  if (prompt) {
    historiquePrompts.unshift(prompt); // ajouter au début
    if (historiquePrompts.length > 50) historiquePrompts.pop(); // max 50
  }
  // Afficher l'animation de chargement
  const loadingDiv = addMessage(`
    <div style="font-size:12px;color:#666;margin-bottom:4px;">Analyse en cours...</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  `);

  try {
    const response = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': '1'
      },
      body: JSON.stringify({
        prompt,
        historique: historiqueConversation  // ← envoyer l'historique
      })
    });

    loadingDiv.remove();

    if (!response.ok) {
      const err = await response.json().catch(() => ({ erreur: 'Erreur réseau' }));
      addMessage(`
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <span style="font-size:18px;">💬</span>
          <div>Je rencontre une difficulté temporaire. Veuillez réessayer.</div>
        </div>
      `);
      return;
    }

    const data = await response.json();

    // Si le chatbot a un message poli (erreur gérée ou besoin de précision)
    if (data.message) {
      addMessage(`
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <span style="font-size:18px;">💬</span>
          <div>${escapeHtml(data.message)}</div>
        </div>
      `);
      // Ajouter le message à l'historique aussi
      historiqueConversation.push({ role: 'assistant', content: data.message });
      return;
    }

    if (!data.succes) {
      addMessage(`
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <span style="font-size:18px;">💬</span>
          <div>Je n'ai pas compris. Pourriez-vous reformuler votre demande ?</div>
        </div>
      `);
      return;
    }

    // Afficher résultat
    const resultHtml = formatData(data.data, data.nombreLignes);
    addMessage(resultHtml);

    // Ajouter le SQL à l'historique pour que Gemini comprenne le contexte
    if (data.sql) {
      historiqueConversation.push({
        role: 'assistant',
        content: `Requête exécutée : ${data.sql}`
      });
    }

    // Limiter l'historique à 6 échanges max
    if (historiqueConversation.length > 12) {
      historiqueConversation = historiqueConversation.slice(-12);
    }

  } catch (err) {
    loadingDiv.remove();
    addMessage(`
      <div style="display:flex;gap:8px;align-items:flex-start;">
        <span style="font-size:18px;">💬</span>
        <div>Je rencontre une difficulté temporaire. Veuillez réessayer dans quelques instants.</div>
      </div>
    `);
  }

  btn.disabled = false;
  input.focus();
}

// Réinitialiser la conversation
function nouvelleConversation() {
  historiqueConversation = [];
  const messages = document.getElementById('messages');
  messages.innerHTML = `
    <div class="message bot-msg">
      Bonjour, qu'est ce que vous voulez savoir ?
    </div>`;
}

  // Clic sur une suggestion rapide
  function askSuggestion(btn) {
    document.getElementById('prompt-input').value = btn.textContent;
    sendMessage();
  }



const SUGGESTIONS = {
    transaction: [
      "Quel est le taux de réussite des transactions ce mois ?",
      "Quelles sont les principales causes de rejet des transactions ?"
    ],
    atm: [
      "Quels ATM faut-il remplir en urgence ?",
      "Quel est le classement des ATM par niveau de remplissage ?",
      "Quel ATM a le solde le plus bas ?"
    ],
    compte: [
      "Combien de comptes ont été créés cette année ?",
      "Quel segment génère le plus de transactions ?"
    ],
    agence: [
      "Quelles sont les 10 agences les plus performantes ?",
      "Quel est le taux de rejet par agence ?",
      "Quelle zone génère le plus de transactions cette année ?"
    ]
  };

  function afficherSuggestions(categorie) {
    const questions = SUGGESTIONS[categorie];
    if (!questions) return;

    const labels = {
      transaction: '💳 Transactions',
      atm:         '🏧 ATM',
      compte:      '🏦 Comptes',
      agence:      '🏢 Agences'
    };

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot-msg';
    div.innerHTML = `
      <div style="margin-bottom:8px;font-weight:600;color:#00843D;">
        ${labels[categorie]} — Choisissez une question :
      </div>
      ${questions.map(q => `
        <div class="question-suggestion" onclick="poserQuestion('${q.replace(/'/g, "\\'")}')">
          <span style="color:#00843D;margin-right:6px;">▶</span>${q}
        </div>
      `).join('')}
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function poserQuestion(question) {
    document.getElementById('prompt-input').value = question;
    sendMessage();
  }


  // Historique des prompts tapés (comme le terminal CMD)
let historiquePrompts = [];
let indexHistorique   = -1;

document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    sendMessage();
    indexHistorique = -1; // réinitialiser la position après envoi
  }

  // Flèche haut → prompt précédent
  if (e.key === 'ArrowUp') {
    e.preventDefault(); // empêche le curseur de bouger dans le champ
    if (historiquePrompts.length === 0) return;
    indexHistorique = Math.min(indexHistorique + 1, historiquePrompts.length - 1);
    document.getElementById('prompt-input').value = historiquePrompts[indexHistorique];
  }

  // Flèche bas → prompt suivant
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (indexHistorique <= 0) {
      indexHistorique = -1;
      document.getElementById('prompt-input').value = '';
      return;
    }
    indexHistorique--;
    document.getElementById('prompt-input').value = historiquePrompts[indexHistorique];
  }
});

// ============================================================
  //  DÉTECTION D'ANOMALIES — bannière automatique
  // ============================================================
  let banniereOuverte = true;
 
  function toggleAlertes() {
    const scroll  = document.getElementById('alerte-scroll');
    const footer  = document.getElementById('alerte-footer');
    const bouton  = document.querySelector('#alerte-header span:last-child');
    banniereOuverte = !banniereOuverte;
    scroll.style.display = banniereOuverte ? 'block' : 'none';
    footer.style.display = banniereOuverte ? 'block' : 'none';
    bouton.textContent   = banniereOuverte ? '▲ Réduire' : '▼ Voir détails';
  }
 
  async function actualiserAlertes() {
    try {
      const res  = await fetch(BACKEND_URL.replace('/api/chat', '/api/alertes'), {
        headers: { 'ngrok-skip-browser-warning': '1' }
      });
      const data = await res.json();
 
      const banner = document.getElementById('alerte-banner');
      const titre  = document.getElementById('alerte-titre');
      const liste  = document.getElementById('alerte-liste');
      const footer = document.getElementById('alerte-footer');
 
      // Masquer si statut chargement ou erreur DB
      if (data.statut === 'erreur') {
        banner.style.display = 'none';
        return;
      }
 
      // Afficher la bannière
      banner.style.display = 'flex';
      banner.className     = data.statut === 'critique' ? 'critique'
                           : data.statut === 'warning'  ? 'warning'
                           : 'ok';
 
      // Titre
      if (data.statut === 'ok') {
        titre.textContent = '✅ Aucune anomalie détectée';
      } else {
        const nb = data.nbCritiques + data.nbWarnings;
        titre.textContent = `${data.statut === 'critique' ? '🔴' : '🟠'} ${nb} anomalie(s) détectée(s)`;
      }
 
      // Liste des alertes
      if (banniereOuverte) {
        liste.innerHTML = data.alertes.map(a => `
          <div class="alerte-ligne">
            <span>${escapeHtml(a.icone)}</span>
            <div>
              <strong>${escapeHtml(a.titre)}</strong>
              <div class="detail">${escapeHtml(a.detail)}</div>
            </div>
          </div>
        `).join('');
 
        // Horodatage
        if (data.horodatage) {
          const heure = new Date(data.horodatage).toLocaleTimeString('fr-TN', { hour: '2-digit', minute: '2-digit' });
          footer.textContent = `Dernière analyse : ${heure}`;
        }
      }
 
    } catch (e) {
      // Silencieux — pas d'affichage d'erreur pour les alertes
      console.warn('Alertes non disponibles:', e.message);
    }
  }
 
  // Actualisation toutes les 5 minutes + au chargement
  actualiserAlertes();
  setInterval(actualiserAlertes, 5 * 60 * 1000);

</script>
</body>
</html>
